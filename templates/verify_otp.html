<!DOCTYPE html>
<html lang="en">
<head>

    <title>Verify OTP</title>

    <style>

        body{

            font-family:Arial;
            background:#f2f2f2;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .container{

            background:white;

            padding:40px;

            border-radius:10px;

            width:350px;

            text-align:center;

            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        input{

            width:100%;
            padding:12px;

            margin-top:20px;

            border:1px solid #ccc;

            border-radius:5px;
        }

        button{

            width:100%;
            padding:12px;

            margin-top:20px;

            background:#dc3545;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;
        }

        button:hover{
            background:#b52a37;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>OTP Verification</h1>

        <p>
            Enter the OTP sent to your
            registered email/mobile
        </p>

        <form method="POST">

            <input
                type="text"
                name="otp"
                placeholder="Enter OTP"
                required
            >

            <button type="submit">
                Verify OTP
            </button>

        </form>

    </div>

</body>
</html>
