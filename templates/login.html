<!DOCTYPE html>
<html lang="en">
<head>

    <title>Login</title>

    <style>

        body{

            font-family:Arial;
            background:#f2f2f2;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .container{

            background:white;
            padding:40px;

            border-radius:10px;

            width:350px;

            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        input{

            width:100%;
            padding:12px;

            margin-top:10px;

            border:1px solid #ccc;
            border-radius:5px;
        }

        button{

            width:100%;
            padding:12px;

            margin-top:20px;

            background:#28a745;

            color:white;

            border:none;
            border-radius:5px;

            cursor:pointer;
        }

        button:hover{
            background:#1e7e34;
        }

        a{
            text-decoration:none;
        }

        .link{
            text-align:center;
            margin-top:15px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="link">

            Don't have an account?

            <a href="/register">
                Register
            </a>

        </div>

    </div>

</body>
</html>
